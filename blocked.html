<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сайт заблокирован</title>
    <style>
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: #eee;
        }
        .container {
            text-align: center;
            background: #16213e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
        }
        h1 {
            color: #e94560;
            margin-bottom: 10px;
        }
        .site-name {
            font-weight: bold;
            background: #0f3460;
            padding: 8px 16px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
        }
        .time-info {
            color: #a7a9be;
            margin: 20px 0;
        }
        button {
            background: #e94560;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background: #ff6b81;
        }
        #countdown {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛔ Доступ ограничен</h1>
        <p>Этот сайт заблокирован по вашему расписанию.</p>
        <div class="site-name" id="siteDisplay">...</div>
        <div class="time-info" id="timeDisplay">...</div>
        <div class="time-info" id="attemptsDisplay">Вы пытались зайти сюда уже 1 раз</div>
        <button id="closeBtn">Закрыть вкладку</button>
        <div id="countdown"></div>
    </div>
    <script src="blocked.js"></script>
</body>
</html>
