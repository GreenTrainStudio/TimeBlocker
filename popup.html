<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 380px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        h2 {
            margin-top: 0;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"], input[type="time"], select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .days-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .day-btn {
            background: #fff;
            border: 1px solid #ccc;
            padding: 5px 0;
            width: calc(14.28% - 5px);
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            user-select: none;
        }
        .day-btn.selected {
            background: #0078d4;
            color: white;
            border-color: #0078d4;
        }
        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        button {
            background: #0078d4;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }
        button.secondary {
            background: #6c757d;
        }
        button.danger {
            background: #d32f2f;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 8px 10px;
            border-radius: 4px;
            margin-bottom: 5px;
            border: 1px solid #eee;
            font-size: 13px;
        }
        .list-item-content {
            flex: 1;
            cursor: pointer;
        }
        .list-item-content span {
            font-weight: 600;
        }
        .attempts-count {
            display: inline-block;
            margin-left: 6px;
            color: #6c757d;
            font-size: 12px;
            font-weight: 600;
        }
        .list-item-actions {
            display: flex;
            gap: 5px;
        }
        .edit-btn, .delete-btn {
            background: none;
            border: none;
            font-weight: bold;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            width: auto;
            flex: 0;
        }
        .edit-btn {
            color: #0078d4;
        }
        .edit-btn:hover {
            background: #e3f2fd;
        }
        .delete-btn {
            color: #d32f2f;
        }
        .delete-btn:hover {
            background: #ffebee;
        }
        hr {
            margin: 15px 0;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .edit-mode-indicator {
            background: #fff3cd;
            padding: 5px 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 12px;
            display: none;
        }
        .edit-mode-indicator.active {
            display: block;
        }
    </style>
</head>
<body>
    <h2>
        <span>⏰ Time Blocker</span>
    </h2>
    
    <div class="edit-mode-indicator" id="editModeIndicator">
        Editing rule for: <strong id="editingSite"></strong>
    </div>

    <div class="section">
        <label>🌐 Domain (e.g. youtube.com):</label>
        <input type="text" id="siteInput" placeholder="youtube.com" />
        <div class="note">Without www and https://</div>
        
        <label>⏳ From:</label>
        <input type="time" id="startTime" value="09:00" />
        
        <label>⌛ To:</label>
        <input type="time" id="endTime" value="18:00" />
        
        <label>📅 Days:</label>
        <div class="days-container" id="daysContainer"></div>
        
        <div class="button-group">
            <button id="addBtn">➕ Add</button>
            <button id="updateBtn" class="secondary" style="display: none;">✏️ Update</button>
            <button id="cancelEditBtn" class="secondary" style="display: none;">❌ Cancel</button>
        </div>
    </div>

    <div class="section">
        <label>📋 Active Rules:</label>
        <div id="rulesList"></div>
        <button id="clearAllBtn" class="danger" style="margin-top:10px;">🗑️ Clear All</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
